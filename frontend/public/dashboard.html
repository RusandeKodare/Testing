<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:3000; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
    <title>Dashboard - Login System</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-card">
            <div class="profile-section">
                <div class="profile-avatar-container">
                    <img id="profile-avatar" class="profile-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%2300c8ff' opacity='0.1'/%3E%3Ccircle cx='100' cy='70' r='40' fill='%2300c8ff'/%3E%3Cpath d='M 60 140 Q 60 110 100 110 Q 140 110 140 140 L 140 180 L 60 180 Z' fill='%2300c8ff'/%3E%3C/svg%3E" alt="Profile">
                    <button id="change-avatar-btn" class="change-avatar-btn" title="Click to change profile picture">📷</button>
                </div>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
            </div>
            
            <div class="dashboard-header">
                <h1>Welcome, <span id="username">User</span>! 👋</h1>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
            
            <div class="dashboard-content">
                <div class="info-card">
                    <h2>🎉 You're logged in!</h2>
                    <p>This is your secure dashboard. You have successfully authenticated.</p>
                </div>

                <div class="info-card">
                    <h3>Session Information</h3>
                    <div class="session-info">
                        <p><strong>Username:</strong> <span id="username-detail">-</span></p>
                        <p><strong>Login Time:</strong> <span id="login-time">-</span></p>
                        <p><strong>Token Status:</strong> <span id="token-status" class="status-active">Active</span></p>
                    </div>
                </div>

                <div class="info-card">
                    <h3>Quick Actions</h3>
                    <div class="actions">
                        <button class="action-btn">View Profile</button>
                        <button class="action-btn">Settings</button>
                        <button class="action-btn">Help</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="dist/dashboard.js"></script>
</body>
</html>
