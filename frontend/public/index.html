<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="backend-status" class="backend-status-banner" role="status" aria-live="polite"></div>
    <div class="container">
        <div class="auth-card">
            <div class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <div id="login-form" class="form-container active">
                <h2>Welcome Back</h2>
                <form id="login-form-element" method="post" action="#">
                    <input type="hidden" name="csrf_token" value="present">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" name="username" required>
                        <span class="error" id="login-username-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required>
                        <span class="error" id="login-password-error"></span>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <div class="message" id="login-message"></div>
                </form>
            </div>

            <div id="register-form" class="form-container">
                <h2>Create Account</h2>
                <form id="register-form-element" method="post" action="#">
                    <input type="hidden" name="csrf_token" value="present">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" name="username" required>
                        <span class="error" id="register-username-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" name="password" required>
                        <span class="error" id="register-password-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" name="confirmPassword" required>
                        <span class="error" id="register-confirm-password-error"></span>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <div class="message" id="register-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="dist/main.js"></script>
</body>
</html>
