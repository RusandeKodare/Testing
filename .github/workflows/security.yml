name: Security Scans

on:
  push:
    branches: [ master ]
  # Keep pull_request (not pull_request_target) to avoid elevated context on untrusted PRs.
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '30 2 * * 1'

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep OWASP SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep locally with OWASP-focused rules
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/nodejs \
            --error .

  dependency-and-secrets:
    name: Dependency And Secret Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Audit backend dependencies (high+)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies (high+)
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Gitleaks (full history)
        run: gitleaks detect --source=. --redact --verbose --log-opts="--all"

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: dependency-and-secrets
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Start backend API
        working-directory: ./backend
        env:
          JWT_SECRET: test-secret-key-for-zap
          NODE_ENV: test
        run: |
          nohup npm run dev > ../backend-zap.log 2>&1 &

      - name: Start frontend server
        working-directory: ./frontend
        run: |
          nohup npm run serve > ../frontend-zap.log 2>&1 &

      - name: Wait for backend and frontend
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              break
            fi
            sleep 2
          done

          for i in {1..40}; do
            if curl -fsS http://localhost:3001/ > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://localhost:3000/api/health > /dev/null
          curl -fsS http://localhost:3001/ > /dev/null

      - name: Run ZAP baseline scan against frontend
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3001
          fail_action: true
          cmd_options: '-a'
      - name: Note baseline scope
        run: echo "ZAP baseline is passive scanning only; use periodic active scans separately for deeper auth/business-logic testing."