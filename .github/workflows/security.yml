name: Security Scans

on:
  # Keep pull_request (not pull_request_target) to avoid elevated context on untrusted PRs.
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '30 2 * * 1'

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep OWASP SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep locally with OWASP-focused rules
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/nodejs \
            --error .

  dependency-and-secrets:
    name: Dependency And Secret Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Audit backend dependencies (high+)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies (high+)
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          /usr/local/bin/gitleaks version

      - name: Run Gitleaks (full history)
        run: /usr/local/bin/gitleaks detect --config=.gitleaks.toml --source=. --redact --verbose --log-opts="--all"

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: dependency-and-secrets
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start backend API
        working-directory: ./backend
        run: |
          export JWT_SECRET="$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")"
          export NODE_ENV=test
          nohup npm run dev > ../backend-zap.log 2>&1 &

      - name: Start frontend server
        working-directory: ./frontend
        run: |
          nohup npm run serve > ../frontend-zap.log 2>&1 &

      - name: Wait for backend and frontend
        run: |
          backend_ok=false
          for i in {1..40}; do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              backend_ok=true
              break
            fi
            sleep 2
          done

          if [ "$backend_ok" != "true" ]; then
            echo "Backend failed health check after waiting."
            echo "--- backend-zap.log (last 200 lines) ---"
            tail -n 200 backend-zap.log || true
            exit 1
          fi

          frontend_ok=false
          for i in {1..40}; do
            if curl -fsS http://localhost:3001/ > /dev/null; then
              frontend_ok=true
              break
            fi
            sleep 2
          done

          if [ "$frontend_ok" != "true" ]; then
            echo "Frontend failed health check after waiting."
            echo "--- frontend-zap.log (last 200 lines) ---"
            tail -n 200 frontend-zap.log || true
            exit 1
          fi

          curl -fsS http://localhost:3000/api/health > /dev/null
          curl -fsS http://localhost:3001/ > /dev/null

      - name: Run ZAP baseline scan against frontend
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3001
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-a -c .zap/rules.tsv'
      - name: Note baseline scope
        run: echo "ZAP baseline is passive scanning only; use periodic active scans separately for deeper auth/business-logic testing."